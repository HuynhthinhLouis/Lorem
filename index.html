<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Messaging UI</title>
  <style>
    /* Basic Reset and Body Styling */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    /* The Main Chat Box */
    .chat-container {
      width: 100%;
      max-width: 450px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      height: 85vh;
      overflow: hidden;
    }

    /* Header */
    .chat-header {
      background: #0084ff;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* The Area Where Messages Appear */
    .chat-messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background-color: #ffffff;
    }

    /* Individual Message Bubbles */
    .message {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 20px;
      line-height: 1.4;
      word-wrap: break-word;
      font-size: 0.95rem;
    }

    /* Styles for Messages You Send */
    .message.sent {
      background: #0084ff;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px; /* Gives it a chat bubble tail */
    }

    /* Styles for Messages You Receive */
    .message.received {
      background: #f0f0f0;
      color: #1c1e21;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    /* The Bottom Input Area */
    .chat-input-area {
      display: flex;
      padding: 15px;
      border-top: 1px solid #eaeaea;
      background: #fafafa;
      gap: 10px;
    }

    .chat-input-area input {
      flex: 1;
      padding: 12px 15px;
      border: 1px solid #ddd;
      border-radius: 25px;
      outline: none;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }

    .chat-input-area input:focus {
      border-color: #0084ff;
    }

    .chat-input-area button {
      background: #0084ff;
      color: white;
      border: none;
      padding: 0 20px;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }

    .chat-input-area button:hover {
      background: #0073e6;
    }
  </style>
</head>
<body>

  <div class="chat-container">
    <div class="chat-header">
      Chat App UI
    </div>
    
    <div class="chat-messages" id="chat-messages">
      <div class="message received">
        Hello! This is a static HTML interface. Try typing a message below!
      </div>
    </div>
    
    <form class="chat-input-area" id="chat-form">
      <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off" required>
      <button type="submit">Send</button>
    </form>
  </div>

  <script>
    const chatForm = document.getElementById('chat-form');
    const messageInput = document.getElementById('message-input');
    const chatMessages = document.getElementById('chat-messages');

    // Listen for when the user hits 'Send' or presses Enter
    chatForm.addEventListener('submit', function(e) {
      e.preventDefault(); // Prevents the page from refreshing
      
      const text = messageInput.value.trim();
      
      if (text !== '') {
        // 1. Create a new div element for the message
        const messageElement = document.createElement('div');
        
        // 2. Add the classes to style it as a sent message
        messageElement.classList.add('message', 'sent');
        
        // 3. Set the text inside the bubble to what the user typed
        messageElement.textContent = text;
        
        // 4. Add the new bubble to the chat window
        chatMessages.appendChild(messageElement);
        
        // 5. Clear the input box for the next message
        messageInput.value = '';
        
        // 6. Automatically scroll to the bottom so the newest message is visible
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }
    });
  </script>

</body>
</html>
