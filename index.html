<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ứng Dụng Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .app-container { width: 100%; max-width: 450px; background: #ffffff; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); display: flex; flex-direction: column; height: 85vh; overflow: hidden; }
    .chat-header { background: #0084ff; color: white; padding: 15px 20px; text-align: center; font-size: 1.1rem; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
    .my-profile { font-size: 0.85rem; background: rgba(255,255,255,0.2); padding: 4px 8px; border-radius: 4px; }
    .panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .panel.active { display: flex; }
    
    .auth-panel { padding: 30px; display: flex; flex-direction: column; gap: 15px; justify-content: center; }
    .auth-panel input { padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95rem; }
    .auth-panel button { padding: 12px; background: #0084ff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; }
    .auth-panel button.register-btn { background: #28a745; }
    
    .register-fields { display: none; flex-direction: column; gap: 15px; border-top: 1px solid #eee; padding-top: 15px; margin-top: 5px; }
    .register-msg { font-size: 0.85rem; color: #d9534f; margin: 0; font-weight: 500; }
    
    .tools-area { padding: 15px; background: #fafafa; border-bottom: 1px solid #eaeaea; display: flex; gap: 10px;}
    .tools-area input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; }
    .tools-area button { padding: 8px 12px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    
    .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background-color: #ffffff; }
    .message { max-width: 75%; padding: 10px 14px; border-radius: 18px; line-height: 1.4; word-wrap: break-word; font-size: 0.95rem; }
    .message.sent { background: #0084ff; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .message.received { background: #f0f0f0; color: #1c1e21; align-self: flex-start; border-bottom-left-radius: 4px; }
    
    .chat-input-area { display: flex; padding: 15px; border-top: 1px solid #eaeaea; background: #fafafa; gap: 10px; }
    .chat-input-area input { flex: 1; padding: 12px 15px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
    .chat-input-area button { background: #0084ff; color: white; border: none; padding: 0 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>

  <div class="app-container">
    
    <!-- PANEL ĐĂNG NHẬP / ĐĂNG KÝ -->
    <div id="auth-panel" class="panel active auth-panel">
      <h2 id="auth-title" style="text-align:center; margin-top:0;">Đăng nhập</h2>
      
      <input type="text" id="contact" placeholder="Nhập địa chỉ Email">
      <input type="password" id="password" placeholder="Mật khẩu">
      
      <!-- Các trường đăng ký mặc định ẩn -->
      <div id="register-fields" class="register-fields">
        <p class="register-msg">Đang tạo tài khoản mới. Vui lòng nhập thêm các thông tin dưới đây:</p>
        <input type="text" id="username" placeholder="Tên hiển thị (VD: Huy)">
        <input type="text" id="custom-id" placeholder="ID (Bắt buộc 4 số, VD: 1234)" maxlength="4">
      </div>

      <button id="auth-btn" onclick="handleAuth()">Đăng nhập</button>
      
      <!-- Thêm nút chuyển đổi chế độ rõ ràng -->
      <p id="toggle-auth-text" style="text-align: center; font-size: 0.9rem; margin-top: 10px; color: #555;">
        Chưa có tài khoản? <a href="#" onclick="toggleAuthMode(true); return false;" style="color: #0084ff; font-weight: bold; text-decoration: none;">Đăng ký ngay</a>
      </p>
    </div>

    <!-- PANEL CHAT -->
    <div id="app-panel" class="panel">
      <div class="chat-header">
        <span>Tin nhắn</span>
        <span class="my-profile" id="my-discord-tag">Tên#0000</span>
      </div>
      
      <div class="tools-area">
        <input type="text" id="friend-search" placeholder="Tìm bạn (VD: Huy#1234)">
        <button onclick="sendFriendRequest()">Kết bạn</button>
      </div>
      
      <div class="chat-messages" id="chat-messages"></div>
      
      <form class="chat-input-area" id="chat-form">
        <input type="text" id="message-input" placeholder="Nhập tin nhắn..." autocomplete="off" required>
        <button type="submit">Gửi</button>
      </form>
    </div>

  </div>

  <script>
    const supabaseUrl = 'https://pkkbimyhlruwdlsrgcvy.supabase.co';
    const supabaseSecretKey = 'sb_publishable_gYFKPW27BdH7LcsGq4flCQ_5bHG2dF3'; 
    const mySupabaseClient = window.supabase.createClient(supabaseUrl, supabaseSecretKey);

    let currentUser = null;
    let currentProfile = null;
    let activeFriendId = null; 
    let isRegisterMode = false; 

    const authPanel = document.getElementById('auth-panel');
    const appPanel = document.getElementById('app-panel');
    const chatMessages = document.getElementById('chat-messages');
    const chatForm = document.getElementById('chat-form');
    const messageInput = document.getElementById('message-input');
    const myTagDisplay = document.getElementById('my-discord-tag');
    
    const registerFields = document.getElementById('register-fields');
    const authBtn = document.getElementById('auth-btn');
    const authTitle = document.getElementById('auth-title');
    const toggleAuthText = document.getElementById('toggle-auth-text');

    // Hàm chuyển đổi giao diện giữa Đăng nhập và Đăng ký
    function toggleAuthMode(isRegister) {
      isRegisterMode = isRegister;
      if (isRegister) {
        authTitle.textContent = 'Đăng ký tài khoản';
        registerFields.style.display = 'flex';
        authBtn.textContent = 'Tạo tài khoản';
        authBtn.classList.add('register-btn');
        toggleAuthText.innerHTML = `Đã có tài khoản? <a href="#" onclick="toggleAuthMode(false); return false;" style="color: #0084ff; font-weight: bold; text-decoration: none;">Đăng nhập</a>`;
      } else {
        authTitle.textContent = 'Đăng nhập';
        registerFields.style.display = 'none';
        authBtn.textContent = 'Đăng nhập';
        authBtn.classList.remove('register-btn');
        toggleAuthText.innerHTML = `Chưa có tài khoản? <a href="#" onclick="toggleAuthMode(true); return false;" style="color: #0084ff; font-weight: bold; text-decoration: none;">Đăng ký ngay</a>`;
      }
    }

    async function hashPassword(password) {
      const encoder = new TextEncoder();
      const data = encoder.encode(password);
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // Hàm xử lý chính
    async function handleAuth() {
      const contact = document.getElementById('contact').value.trim();
      const password = document.getElementById('password').value;
      
      if (!contact || !password) return alert("Vui lòng nhập đầy đủ Email và mật khẩu!");
      if (!contact.includes('@')) return alert("Vui lòng nhập một địa chỉ email hợp lệ!");

      const credentials = { email: contact, password: password };

      if (!isRegisterMode) {
        // ---- TIẾN TRÌNH ĐĂNG NHẬP ----
        const { data, error } = await mySupabaseClient.auth.signInWithPassword(credentials);
        
        if (error) {
          // Thông báo lỗi chính xác thay vì tự chuyển sang đăng ký
          return alert("Đăng nhập thất bại: Sai tài khoản, mật khẩu hoặc email chưa được xác thực!");
        } 
        
        currentUser = data.user;
        await loadProfile();
        showApp();

      } else {
        // ---- TIẾN TRÌNH ĐĂNG KÝ ----
        const username = document.getElementById('username').value.trim();
        const customId = document.getElementById('custom-id').value.trim();

        if (!/^\d{4}$/.test(customId)) return alert("Lỗi: ID bắt buộc phải là 4 chữ số (Ví dụ: 1234)!");
        if (!username) return alert("Vui lòng nhập tên hiển thị!");

        // 1. Tạo tài khoản Auth
        const { data, error } = await mySupabaseClient.auth.signUp(credentials);
        if (error) return alert("Lỗi tạo tài khoản: " + error.message);
        
        // Cảnh báo nếu Supabase yêu cầu xác nhận Email
        if (data.user && data.user.identities && data.user.identities.length === 0) {
            return alert("Tài khoản này đã tồn tại! Vui lòng chuyển sang tab Đăng nhập.");
        }
        
        if (data.session === null && data.user) {
             // Trường hợp yêu cầu xác thực email đang bật trong Supabase
             alert("Vui lòng kiểm tra email của bạn để xác nhận tài khoản trước khi tiếp tục!");
             return;
        }
        
        // 2. Mã hóa mật khẩu lưu vào Profiles
        const myPasswordHash = await hashPassword(password);

        // 3. Lưu thông tin Profile
        const { error: profileError } = await mySupabaseClient.from('profiles').insert([{ 
          id: data.user.id, 
          username: username, 
          tag: customId,
          email: contact,
          password_hash: myPasswordHash 
        }]);

        if (profileError) {
          if(profileError.code === '23505') return alert("Lỗi: Tên và ID này đã có người sử dụng. Vui lòng chọn Tên hoặc ID khác.");
          return alert("Lỗi lưu thông tin: " + profileError.message);
        }
        
        alert('Tạo tài khoản thành công! Hệ thống đang đăng nhập...');
        
        // Đưa giao diện về lại trạng thái chuẩn và tự động đăng nhập
        toggleAuthMode(false);
        const signInData = await mySupabaseClient.auth.signInWithPassword(credentials);
        if (signInData.error) return alert("Không thể tự động đăng nhập. Vui lòng thử đăng nhập thủ công!");
        
        currentUser = signInData.data.user;
        await loadProfile();
        showApp();
      }
    }

    async function loadProfile() {
      const { data, error } = await mySupabaseClient.from('profiles').select('*').eq('id', currentUser.id).single();
      if (error || !data) {
        alert("Không tìm thấy profile tương ứng với tài khoản này! (Có thể chưa lưu vào bảng profiles)");
        return;
      }
      currentProfile = data;
      myTagDisplay.textContent = `${data.username}#${data.tag}`;
      subscribeToMessages();
    }

    function showApp() {
      authPanel.classList.remove('active');
      appPanel.classList.add('active');
    }

    async function sendFriendRequest() {
      const searchQuery = document.getElementById('friend-search').value.trim();
      if (!searchQuery.includes('#')) return alert('Vui lòng nhập đúng định dạng: Tên#1234');
      
      const [username, tag] = searchQuery.split('#');
      
      const { data: friendProfile, error } = await mySupabaseClient
        .from('profiles')
        .select('id')
        .eq('username', username)
        .eq('tag', tag)
        .single();
        
      if (error || !friendProfile) return alert('Không tìm thấy người dùng này!');
      if (friendProfile.id === currentProfile.id) return alert('Bạn không thể tự kết bạn với chính mình!');
      
      await mySupabaseClient.from('friends').insert([{
        sender_id: currentProfile.id,
        receiver_id: friendProfile.id,
        status: 'accepted'
      }]);
      
      activeFriendId = friendProfile.id;
      alert(`Đã kết nối với ${searchQuery}! Bây giờ bạn có thể nhắn tin.`);
      chatMessages.innerHTML = ''; 
    }

    chatForm.addEventListener('submit', async function(e) {
      e.preventDefault();
      const text = messageInput.value.trim();
      
      if (text !== '' && activeFriendId) {
        renderMessage(text, 'sent');
        messageInput.value = '';

        await mySupabaseClient.from('messages').insert([{
          sender_id: currentProfile.id,
          receiver_id: activeFriendId,
          content: text
        }]);
      } else if (!activeFriendId) {
        alert("Vui lòng tìm và kết bạn trước khi nhắn tin!");
      }
    });

    function renderMessage(text, type) {
      const msgDiv = document.createElement('div');
      msgDiv.classList.add('message', type);
      msgDiv.textContent = text;
      chatMessages.appendChild(msgDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight; 
    }

    function subscribeToMessages() {
      mySupabaseClient.channel('public:messages')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
          const newMsg = payload.new;
          if (newMsg.receiver_id === currentProfile.id && newMsg.sender_id === activeFriendId) {
            renderMessage(newMsg.content, 'received');
          }
        })
        .subscribe();
    }
  </script>
</body>
</html>
