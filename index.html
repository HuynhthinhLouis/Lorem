<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Boba Chat 🧋</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #FDF8F5;       
      --primary: #D4A373;        
      --primary-dark: #B58453;
      --secondary: #FAEDCD;      
      --text-main: #5E3A25;      
      --text-light: #9C7A5D;
      --white: #FFFFFF;
      --bubble-sent: #D4A373;
      --bubble-recv: #FAEDCD;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
    
    body { 
      background-color: #eaddd3; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      color: var(--text-main);
      overflow: hidden;
    }

    /* Hiệu ứng Background ngẫu nhiên & mờ mờ */
    .boba-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
    .boba-icon-blur {
      position: absolute; opacity: 0.15; filter: blur(2px);
      animation: floatSlow linear infinite alternate;
    }
    @keyframes floatSlow {
      from { transform: translateY(0px) rotate(0deg); }
      to { transform: translateY(-20px) rotate(10deg); }
    }

    /* In-app Toast Notifications */
    #notification-container {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      z-index: 9999; width: 90%; max-width: 400px; pointer-events: none;
      display: flex; flex-direction: column; gap: 10px;
    }
    .toast {
      background: rgba(255, 255, 255, 0.95); border-left: 5px solid var(--primary);
      padding: 12px 20px; border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 12px;
      animation: slideDown 0.4s ease forwards; pointer-events: all;
    }
    .toast-content { flex: 1; }
    .toast-title { color: var(--primary); font-weight: 800; font-size: 1rem; margin-bottom: 2px;}
    .toast-msg { color: var(--text-main); font-size: 0.9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 250px;}
    @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

    .app-container { 
      width: 100%; max-width: 480px; background: var(--bg-color); height: 100vh; 
      position: relative; overflow: hidden; display: flex; flex-direction: column; 
      box-shadow: 0 10px 30px rgba(94, 58, 37, 0.15); z-index: 1;
    }
    
    @media (min-width: 481px) { .app-container { height: 90vh; border-radius: 24px; } }

    /* Auth & Inputs */
    .auth-panel { padding: 40px 30px; display: flex; flex-direction: column; gap: 15px; justify-content: center; height: 100%; }
    .auth-title { text-align: center; font-size: 2rem; font-weight: 800; color: var(--primary); margin-bottom: 10px; }
    .auth-subtitle { text-align: center; font-size: 1rem; color: var(--text-light); margin-top: -15px; margin-bottom: 20px; }
    .input-cute { padding: 15px; border: 2px solid #EFE4D8; border-radius: 16px; font-size: 1rem; outline: none; background: var(--white); color: var(--text-main); font-weight: 600; transition: all 0.3s;}
    .input-cute:focus { border-color: var(--primary); box-shadow: 0 4px 12px rgba(212, 163, 115, 0.2); }
    .btn-cute { padding: 15px; background: var(--primary); color: var(--white); border: none; border-radius: 16px; cursor: pointer; font-weight: 800; font-size: 1.1rem; transition: background 0.2s; }
    .btn-cute:active { transform: scale(0.98); }
    .register-fields { display: none; flex-direction: column; gap: 15px; }
    .id-container { display: flex; justify-content: space-between; gap: 10px; }
    .id-box { width: 100%; height: 55px; font-size: 1.5rem; text-align: center; border: 2px solid #EFE4D8; border-radius: 14px; outline: none; font-weight: 800; color: var(--text-main); }
    
    /* App Layout */
    .screen { display: none; flex-direction: column; height: 100%; width: 100%; }
    .screen.active { display: flex; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .header-bar { padding: 20px; background: var(--white); border-bottom: 1px solid #EFE4D8; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .header-title { font-size: 1.4rem; font-weight: 800; color: var(--primary); }
    
    /* Tabs & Nav */
    .tab-content { flex: 1; overflow-y: auto; padding-bottom: 80px; }
    .tab-pane { display: none; flex-direction: column; }
    .tab-pane.active { display: flex; }
    .bottom-nav { position: absolute; bottom: 0; width: 100%; height: 70px; background: var(--white); border-top: 1px solid #EFE4D8; display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); border-radius: 20px 20px 0 0; box-shadow: 0 -4px 20px rgba(0,0,0,0.03); z-index: 20;}
    .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-light); font-weight: 700; font-size: 0.8rem; gap: 4px; cursor: pointer; flex: 1; padding: 10px 0; transition: color 0.2s;}
    .nav-item.active { color: var(--primary); transform: scale(1.05); }
    .nav-icon { font-size: 1.5rem; }

    /* Lists */
    .friend-item { display: flex; align-items: center; padding: 15px 20px; border-bottom: 1px solid #F5EBE1; cursor: pointer; background: var(--white); margin: 8px 15px; border-radius: 16px; box-shadow: 0 2px 8px rgba(94, 58, 37, 0.04); transition: transform 0.2s; }
    .friend-item:active { transform: scale(0.98); background: var(--bg-color); }
    .avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid var(--secondary); background: var(--secondary); }
    .friend-info { margin-left: 15px; flex: 1; overflow: hidden; }
    .friend-name { font-weight: 800; font-size: 1.1rem; display: flex; align-items: baseline; justify-content: space-between;}
    .friend-tag { font-size: 0.8rem; color: var(--primary); background: #FFF4E6; padding: 2px 6px; border-radius: 6px; }
    .last-msg { font-size: 0.9rem; color: var(--text-light); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600; }
    
    /* Requests */
    .request-btn-group { display: flex; gap: 8px; margin-top: 8px; }
    .btn-accept { background: #8BC34A; color: white; border: none; padding: 6px 12px; border-radius: 8px; font-weight: bold; cursor: pointer;}
    .btn-reject { background: #E57373; color: white; border: none; padding: 6px 12px; border-radius: 8px; font-weight: bold; cursor: pointer;}

    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-light); font-weight: 600; }

    /* Profile Tab */
    .profile-header { display: flex; flex-direction: column; align-items: center; padding: 30px 20px; background: var(--white); margin-bottom: 10px; border-radius: 0 0 24px 24px; }
    .profile-avatar { width: 90px; height: 90px; border-radius: 50%; border: 4px solid var(--primary); margin-bottom: 10px; }
    .profile-name { font-size: 1.5rem; font-weight: 800; }
    .add-friend-card { background: var(--white); margin: 15px; padding: 20px; border-radius: 16px; }
    .add-friend-box { display: flex; gap: 10px; margin-top: 10px; }
    .add-friend-box input { flex: 1; border-radius: 12px; border: 2px solid #EFE4D8; padding: 10px 15px; outline: none; font-weight: 600;}
    .add-friend-box button { background: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 12px; font-weight: bold; cursor: pointer; }

    /* Chat Room */
    .chat-room { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 50; display: none; flex-direction: column; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
    .chat-room.active { display: flex; transform: translateX(0); }
    .chat-room-header { background: var(--white); padding: 15px 20px; display: flex; align-items: center; border-bottom: 1px solid #EFE4D8; gap: 15px; padding-top: env(safe-area-inset-top); }
    .back-btn { background: none; border: none; font-size: 1.5rem; color: var(--primary); cursor: pointer; width: 40px; height: 40px; border-radius: 50%; background: #FFF4E6; display: flex; justify-content: center; align-items: center;}
    
    .messages-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; position: relative;}
    
    /* Message Bubbles */
    .msg-wrapper { display: flex; flex-direction: column; max-width: 75%; position: relative; cursor: pointer; }
    .msg-wrapper.sent { align-self: flex-end; align-items: flex-end; }
    .msg-wrapper.received { align-self: flex-start; align-items: flex-start; }
    
    .msg-bubble { padding: 12px 16px; border-radius: 20px; font-size: 0.95rem; line-height: 1.4; font-weight: 600; word-wrap: break-word; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .msg-wrapper.sent .msg-bubble { background: var(--bubble-sent); color: var(--white); border-bottom-right-radius: 4px; }
    .msg-wrapper.received .msg-bubble { background: var(--white); color: var(--text-main); border: 1px solid #EFE4D8; border-bottom-left-radius: 4px; }
    
    /* Hình ảnh & Sticker */
    .msg-img { max-width: 200px; border-radius: 12px; margin-top: 5px; cursor: pointer; border: 2px solid #EFE4D8; }
    .msg-sticker { font-size: 4rem; line-height: 1; background: transparent !important; border: none !important; box-shadow: none !important; padding: 0 !important; }
    
    /* Reaction Badge */
    .reaction-badge { position: absolute; bottom: -10px; right: -5px; background: white; border-radius: 50%; padding: 2px 4px; font-size: 0.8rem; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border: 1px solid #EFE4D8; }
    .msg-wrapper.received .reaction-badge { right: auto; left: -5px; }

    /* Input Area */
    .chat-input-area { padding: 10px 15px; background: var(--white); border-top: 1px solid #EFE4D8; display: flex; align-items: center; gap: 8px; padding-bottom: env(safe-area-inset-bottom); position: relative;}
    .icon-btn { background: #FFF4E6; color: var(--primary); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0;}
    .chat-input-area input[type="text"] { flex: 1; padding: 12px 15px; border: 2px solid #EFE4D8; border-radius: 24px; outline: none; font-size: 0.95rem; background: var(--bg-color); }
    .chat-input-area button[type="submit"] { background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; flex-shrink: 0; }
    
    /* Sticker Panel */
    .sticker-panel { display: none; position: absolute; bottom: 70px; left: 15px; background: white; border: 2px solid #EFE4D8; border-radius: 16px; padding: 10px; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); gap: 10px; flex-wrap: wrap; width: 250px; z-index: 60;}
    .sticker-panel.active { display: flex; animation: slideUp 0.3s ease; }
    .sticker-item { font-size: 2rem; cursor: pointer; transition: transform 0.2s; }
    .sticker-item:hover { transform: scale(1.2); }
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  </style>
</head>
<body>
  
  <div class="boba-bg" id="boba-bg"></div> 
  
  <div id="notification-container"></div>

  <div class="app-container">
    
    <div id="auth-screen" class="screen active auth-panel">
      <div style="text-align: center; margin-bottom: 10px; font-size: 4rem;">🧋</div>
      <h2 id="auth-title" class="auth-title">Xin chào!</h2>
      <p id="auth-subtitle" class="auth-subtitle">Đăng nhập vào Boba Chat</p>
      
      <input type="email" id="contact" class="input-cute" placeholder="Email của bạn">
      <input type="password" id="password" class="input-cute" placeholder="Mật khẩu">
      
      <div id="register-fields" class="register-fields">
        <input type="text" id="username" class="input-cute" placeholder="Tên hiển thị (VD: Huy)">
        <p style="font-size: 0.85rem; color: var(--text-light); margin-bottom: -10px; font-weight: bold;">Nhập ID 4 số của bạn:</p>
        <div class="id-container">
          <input type="text" maxlength="1" class="id-box">
          <input type="text" maxlength="1" class="id-box">
          <input type="text" maxlength="1" class="id-box">
          <input type="text" maxlength="1" class="id-box">
        </div>
      </div>

      <button id="auth-btn" class="btn-cute" onclick="handleAuth()">Đăng nhập</button>
      <p id="toggle-auth-text" style="text-align: center; font-size: 0.95rem; margin-top: 10px; font-weight: 600;">
        Chưa có tài khoản? <a href="#" onclick="toggleAuthMode(true); return false;" style="color: var(--primary); font-weight: 800; text-decoration: none;">Đăng ký ngay</a>
      </p>
    </div>

    <div id="main-screen" class="screen">
      
      <div id="tab-chats" class="tab-pane active">
        <div class="header-bar"><span class="header-title">Đoạn chat 💬</span></div>
        <div class="tab-content" id="chat-list-container"></div>
      </div>

      <div id="tab-account" class="tab-pane">
        <div class="header-bar">
          <span class="header-title">Hồ sơ 👤</span>
          <button onclick="logout()" style="background:none; border:none; color:#d9534f; font-weight:bold; cursor:pointer;">Đăng xuất</button>
        </div>
        <div class="tab-content">
          <div class="profile-header">
            <img id="my-avatar" class="profile-avatar" src="" alt="Avatar">
            <div class="profile-name" id="my-name">Tên hiển thị</div>
            <div style="color: var(--primary); font-weight: 800; background: #FFF4E6; padding: 4px 12px; border-radius: 12px; margin-top: 8px;" id="my-tag">#0000</div>
          </div>

          <div class="add-friend-card">
            <h3 style="color: var(--text-main);">Thêm bạn bè mới</h3>
            <div class="add-friend-box">
              <input type="text" id="friend-search" placeholder="Nhập Tên#1234">
              <button onclick="sendFriendRequest()">Gửi</button>
            </div>
          </div>
          
          <h3 style="margin: 20px 20px 5px 20px; font-size: 1.1rem; color: var(--text-main);">Lời mời kết bạn</h3>
          <div id="friend-requests-list"></div>

          <h3 style="margin: 20px 20px 5px 20px; font-size: 1.1rem; color: var(--text-main);">Danh sách bạn bè</h3>
          <div id="account-friend-list"></div>
        </div>
      </div>

      <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('chats', this)">
          <span class="nav-icon">💬</span><span>Tin nhắn</span>
        </div>
        <div class="nav-item" onclick="switchTab('account', this)">
          <span class="nav-icon">👤</span><span>Tài khoản</span>
        </div>
      </div>
    </div>

    <div id="chat-room" class="chat-room">
      <div class="chat-room-header">
        <button class="back-btn" onclick="closeChat()">❮</button>
        <img id="chat-room-avatar" class="avatar" style="width: 45px; height: 45px;" src="">
        <div class="friend-name" style="font-size: 1.2rem;" id="chat-room-name"></div>
      </div>
      
      <div class="messages-area" id="messages-area"></div>
      
      <div class="sticker-panel" id="sticker-panel">
        <div class="sticker-item" onclick="sendSticker('🐻')">🐻</div>
        <div class="sticker-item" onclick="sendSticker('🐰')">🐰</div>
        <div class="sticker-item" onclick="sendSticker('🐱')">🐱</div>
        <div class="sticker-item" onclick="sendSticker('💖')">💖</div>
        <div class="sticker-item" onclick="sendSticker('🌸')">🌸</div>
        <div class="sticker-item" onclick="sendSticker('🧋')">🧋</div>
        <div class="sticker-item" onclick="sendSticker('😂')">😂</div>
        <div class="sticker-item" onclick="sendSticker('😭')">😭</div>
      </div>

      <div class="chat-input-area">
        <button class="icon-btn" onclick="document.getElementById('file-upload').click()">📷</button>
        <input type="file" id="file-upload" accept="image/*;capture=camera" style="display: none;" onchange="uploadImage(event)">
        
        <button class="icon-btn" onclick="toggleStickers()">😊</button>
        
        <form id="chat-form" style="display: flex; flex: 1; gap: 8px;">
          <input type="text" id="message-input" placeholder="Gửi tin nhắn" autocomplete="off">
          <button type="submit">➤</button>
        </form>
      </div>
    </div>

  </div>

  <script>
    // --- KHỞI TẠO NỀN BOBA NGẪU NHIÊN VÀ MỜ MỜ ---
    function createBobas() {
      const bg = document.getElementById('boba-bg');
      bg.innerHTML = ''; // Làm sạch nền trước khi tạo mới
      const icons = ['🧋', '🌸', '✨', '🤍', '🍡'];
      // Tạo ra 40 icon ngẫu nhiên trên toàn bộ màn hình
      for (let i = 0; i < 40; i++) {
        const icon = document.createElement('div');
        icon.className = 'boba-icon-blur';
        icon.innerText = icons[Math.floor(Math.random() * icons.length)];
        icon.style.left = Math.random() * 100 + 'vw';
        icon.style.top = Math.random() * 100 + 'vh';
        icon.style.fontSize = (Math.random() * 1.5 + 1.5) + 'rem';
        icon.style.animationDuration = (Math.random() * 3 + 3) + 's';
        icon.style.animationDelay = `-${Math.random() * 2}s`;
        bg.appendChild(icon);
      }
    }
    createBobas();

    // --- HÀM TẠO THÔNG BÁO TOAST ---
    function showAppNotification(title, message) {
      const container = document.getElementById('notification-container');
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `
        <span style="font-size: 1.8rem;">🧋</span>
        <div class="toast-content">
          <div class="toast-title">${title}</div>
          <div class="toast-msg">${message}</div>
        </div>
      `;
      container.appendChild(toast);
      
      // Tự động ẩn đi sau 4 giây
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(-20px)';
        toast.style.transition = 'all 0.3s ease';
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    // --- CẤU HÌNH SUPABASE ---
    const supabaseUrl = 'https://pkkbimyhlruwdlsrgcvy.supabase.co';
    const supabaseSecretKey = 'sb_publishable_gYFKPW27BdH7LcsGq4flCQ_5bHG2dF3'; 
    const mySupabaseClient = window.supabase.createClient(supabaseUrl, supabaseSecretKey);

    let currentUser = null;
    let currentProfile = null;
    let activeFriendId = null; 
    let isRegisterMode = false; 
    let friendsList = [];

    function getAvatarUrl(seed) { return `https://api.dicebear.com/7.x/adventurer-neutral/svg?seed=${encodeURIComponent(seed)}&backgroundColor=FAEDCD`; }

    // Logic ID Box
    const idBoxes = document.querySelectorAll('.id-box');
    idBoxes.forEach((box, i) => {
      box.addEventListener('input', (e) => {
        e.target.value = e.target.value.replace(/[^0-9]/g, '');
        if (e.target.value && i < idBoxes.length - 1) idBoxes[i + 1].focus();
      });
      box.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && i > 0) idBoxes[i - 1].focus();
      });
    });
    function getCustomId() { return Array.from(idBoxes).map(b => b.value).join(''); }

    // Toggle Mode
    function toggleAuthMode(isRegister) {
      isRegisterMode = isRegister;
      document.getElementById('auth-title').textContent = isRegister ? 'Tạo tài khoản' : 'Xin chào!';
      document.getElementById('auth-subtitle').textContent = isRegister ? 'Trở thành thành viên' : 'Đăng nhập vào Boba Chat';
      document.getElementById('register-fields').style.display = isRegister ? 'flex' : 'none';
      document.getElementById('auth-btn').textContent = isRegister ? 'Tạo tài khoản' : 'Đăng nhập';
      document.getElementById('toggle-auth-text').innerHTML = isRegister 
        ? `Đã có tài khoản? <a href="#" onclick="toggleAuthMode(false)">Đăng nhập</a>` 
        : `Chưa có tài khoản? <a href="#" onclick="toggleAuthMode(true)">Đăng ký ngay</a>`;
    }

    async function handleAuth() {
      const email = document.getElementById('contact').value.trim();
      const pass = document.getElementById('password').value;
      if (!email || !pass) return alert("Nhập đủ thông tin nha!");

      if (!isRegisterMode) {
        const { data, error } = await mySupabaseClient.auth.signInWithPassword({ email: email, password: pass });
        if (error) return alert("Sai mật khẩu hoặc email òi!");
        currentUser = data.user;
        await loadApp();
      } else {
        const username = document.getElementById('username').value.trim();
        const customId = getCustomId();
        if (customId.length !== 4) return alert("ID phải đủ 4 số!");
        
        const { data, error } = await mySupabaseClient.auth.signUp({ email, password: pass });
        if (error) return alert("Lỗi: " + error.message);
        
        await mySupabaseClient.from('profiles').insert([{ id: data.user.id, username, tag: customId, email }]);
        currentUser = data.user;
        await loadApp();
      }
    }

    async function loadApp() {
      const { data } = await mySupabaseClient.from('profiles').select('*').eq('id', currentUser.id).single();
      currentProfile = data;
      document.getElementById('my-name').textContent = data.username;
      document.getElementById('my-tag').textContent = `#${data.tag}`;
      document.getElementById('my-avatar').src = getAvatarUrl(data.username + data.tag);
      document.getElementById('auth-screen').classList.remove('active');
      document.getElementById('main-screen').classList.add('active');
      await loadFriendsData();
      subscribeToChanges();
    }

    function switchTab(tab, el) {
      document.querySelectorAll('.tab-pane, .nav-item').forEach(e => e.classList.remove('active'));
      document.getElementById(`tab-${tab}`).classList.add('active');
      el.classList.add('active');
      if(tab === 'account') loadFriendsData();
    }

    function logout() { mySupabaseClient.auth.signOut(); window.location.reload(); }

    // --- LOGIC BẠN BÈ & LỜI MỜI ---
    async function loadFriendsData() {
      const { data: relations } = await mySupabaseClient.from('friends')
        .select('id, sender_id, receiver_id, status')
        .or(`sender_id.eq.${currentProfile.id},receiver_id.eq.${currentProfile.id}`);
      
      const reqList = document.getElementById('friend-requests-list');
      const accList = document.getElementById('account-friend-list');
      const chatList = document.getElementById('chat-list-container');
      reqList.innerHTML = accList.innerHTML = chatList.innerHTML = '';
      friendsList = [];

      if (!relations || relations.length === 0) {
        chatList.innerHTML = accList.innerHTML = reqList.innerHTML = '<div class="empty-state">Trống trơn à...</div>';
        return;
      }

      for (let rel of relations) {
        const isSender = rel.sender_id === currentProfile.id;
        const friendId = isSender ? rel.receiver_id : rel.sender_id;
        const { data: fProfile } = await mySupabaseClient.from('profiles').select('*').eq('id', friendId).single();
        if(!fProfile) continue;

        const avatar = getAvatarUrl(fProfile.username + fProfile.tag);

        if (rel.status === 'pending') {
          if (!isSender) { // Người khác gửi cho mình
            reqList.innerHTML += `
              <div class="friend-item">
                <img class="avatar" src="${avatar}">
                <div class="friend-info">
                  <div class="friend-name">${fProfile.username} <span class="friend-tag">#${fProfile.tag}</span></div>
                  <div class="request-btn-group">
                    <button class="btn-accept" onclick="respondRequest('${rel.id}', 'accepted')">Đồng ý</button>
                    <button class="btn-reject" onclick="respondRequest('${rel.id}', 'rejected')">Từ chối</button>
                  </div>
                </div>
              </div>`;
          }
        } else if (rel.status === 'accepted') {
          friendsList.push(fProfile);
          // Render bên Tab Account
          accList.innerHTML += `
            <div class="friend-item">
              <img class="avatar" src="${avatar}">
              <div class="friend-info">
                <div class="friend-name">${fProfile.username} <span class="friend-tag">#${fProfile.tag}</span></div>
              </div>
            </div>`;
            
          // Lấy tin nhắn cuối cho Tab Chat
          const { data: lastMsg } = await mySupabaseClient.from('messages')
            .select('content, is_sticker, image_url')
            .or(`and(sender_id.eq.${currentProfile.id},receiver_id.eq.${fProfile.id}),and(sender_id.eq.${fProfile.id},receiver_id.eq.${currentProfile.id})`)
            .order('created_at', { ascending: false }).limit(1);
            
          let text = 'Bấm để chat nè...';
          if(lastMsg && lastMsg.length > 0) {
            if(lastMsg[0].is_sticker) text = '[Sticker]';
            else if(lastMsg[0].image_url) text = '[Hình ảnh]';
            else text = lastMsg[0].content;
          }

          chatList.innerHTML += `
            <div class="friend-item" onclick="openChat('${fProfile.id}', '${fProfile.username}', '${fProfile.tag}')">
              <img class="avatar" src="${avatar}">
              <div class="friend-info">
                <div class="friend-name">${fProfile.username}</div>
                <div class="last-msg" id="last-msg-${fProfile.id}">${text}</div>
              </div>
            </div>`;
        }
      }
      
      if(reqList.innerHTML === '') reqList.innerHTML = '<div class="empty-state">Không có lời mời nào</div>';
      if(accList.innerHTML === '') accList.innerHTML = '<div class="empty-state">Chưa có bạn bè</div>';
    }

    async function sendFriendRequest() {
      const q = document.getElementById('friend-search').value.trim();
      if(!q.includes('#')) return alert('Ghi đúng tên#ID nha!');
      const [u, t] = q.split('#');
      
      const { data: f } = await mySupabaseClient.from('profiles').select('id').eq('username', u).eq('tag', t).single();
      if(!f) return alert('Tìm không thấy bạn này :(');
      if(f.id === currentProfile.id) return alert('Sao lại tự kết bạn với mình?');

      await mySupabaseClient.from('friends').insert([{ sender_id: currentProfile.id, receiver_id: f.id, status: 'pending' }]);
      alert('Đã gửi lời mời!'); document.getElementById('friend-search').value = '';
    }

    async function respondRequest(relId, status) {
      if(status === 'rejected') await mySupabaseClient.from('friends').delete().eq('id', relId);
      else await mySupabaseClient.from('friends').update({ status }).eq('id', relId);
      loadFriendsData();
    }

    // --- LOGIC PHÒNG CHAT ---
    async function openChat(fid, name, tag) {
      activeFriendId = fid;
      document.getElementById('chat-room-name').textContent = name;
      document.getElementById('chat-room-avatar').src = getAvatarUrl(name+tag);
      document.getElementById('chat-room').classList.add('active');
      document.getElementById('sticker-panel').classList.remove('active');
      
      const area = document.getElementById('messages-area');
      area.innerHTML = '';
      
      const { data: msgs } = await mySupabaseClient.from('messages').select('*')
        .or(`and(sender_id.eq.${currentProfile.id},receiver_id.eq.${fid}),and(sender_id.eq.${fid},receiver_id.eq.${currentProfile.id})`)
        .order('created_at', { ascending: true });
        
      if(msgs) msgs.forEach(m => renderMessage(m));
      setTimeout(() => area.scrollTo(0, area.scrollHeight), 100);
    }
    
    function closeChat() { document.getElementById('chat-room').classList.remove('active'); activeFriendId = null; loadFriendsData();}

    function toggleStickers() { document.getElementById('sticker-panel').classList.toggle('active'); }

    // Form gửi tin nhắn Text
    document.getElementById('chat-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const input = document.getElementById('message-input');
      const text = input.value.trim();
      if(text && activeFriendId) {
        input.value = '';
        await mySupabaseClient.from('messages').insert([{ sender_id: currentProfile.id, receiver_id: activeFriendId, content: text }]);
      }
    });

    // Gửi Sticker
    async function sendSticker(emoji) {
      toggleStickers();
      if(activeFriendId) {
        await mySupabaseClient.from('messages').insert([{ sender_id: currentProfile.id, receiver_id: activeFriendId, content: emoji, is_sticker: true }]);
      }
    }

    // Gửi Hình Ảnh
    async function uploadImage(e) {
      const file = e.target.files[0];
      if(!file || !activeFriendId) return;
      const fileExt = file.name.split('.').pop();
      const fileName = `${Date.now()}.${fileExt}`;
      
      // Upload lên Supabase Storage (Bucket phải là 'chat_images' public)
      const { data, error } = await mySupabaseClient.storage.from('chat_images').upload(fileName, file);
      if(error) return alert("Lỗi tải ảnh: " + error.message);
      
      const imgUrl = mySupabaseClient.storage.from('chat_images').getPublicUrl(fileName).data.publicUrl;
      await mySupabaseClient.from('messages').insert([{ sender_id: currentProfile.id, receiver_id: activeFriendId, image_url: imgUrl }]);
    }

    // Thả tim/Reaction (Click đúp)
    async function reactToMessage(msgId) {
      const reaction = prompt("Nhập icon để thả tim (VD: ❤️, 👍, 😂):", "❤️");
      if(reaction) {
        await mySupabaseClient.from('messages').update({ reaction: reaction }).eq('id', msgId);
      }
    }

    function renderMessage(msg) {
      const isMe = msg.sender_id === currentProfile.id;
      const wrap = document.createElement('div');
      wrap.className = `msg-wrapper ${isMe ? 'sent' : 'received'}`;
      wrap.id = `msg-${msg.id}`;
      wrap.ondblclick = () => reactToMessage(msg.id); // Double click để thả tim

      let contentHTML = '';
      if(msg.is_sticker) {
        contentHTML = `<div class="msg-bubble msg-sticker">${msg.content}</div>`;
      } else if (msg.image_url) {
        contentHTML = `<img class="msg-img" src="${msg.image_url}" alt="image" onclick="window.open('${msg.image_url}')">`;
      } else {
        contentHTML = `<div class="msg-bubble">${msg.content}</div>`;
      }

      let reactionHTML = msg.reaction ? `<div class="reaction-badge">${msg.reaction}</div>` : '';
      
      wrap.innerHTML = contentHTML + reactionHTML;
      const area = document.getElementById('messages-area');
      area.appendChild(wrap);
      area.scrollTop = area.scrollHeight;
    }

    // Lắng nghe Real-time Data và Kích hoạt Thông Báo
    function subscribeToChanges() {
      // Nghe tin nhắn mới hoặc reaction mới
      mySupabaseClient.channel('public:messages')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, payload => {
          if(payload.eventType === 'INSERT') {
            const m = payload.new;
            
            if (m.receiver_id === currentProfile.id) {
              // Nếu người khác gửi cho mình
              if (activeFriendId === m.sender_id) {
                // Đang mở đoạn chat với người đó -> render tin nhắn trực tiếp
                renderMessage(m);
              } else {
                // Không mở đoạn chat -> Hiển thị thông báo In-app
                const sender = friendsList.find(f => f.id === m.sender_id);
                const senderName = sender ? sender.username : "Ai đó";
                let msgPreview = m.is_sticker ? '[Sticker]' : (m.image_url ? '[Hình ảnh]' : m.content);
                
                showAppNotification(`Tin nhắn từ ${senderName}`, msgPreview);
                
                // Cập nhật text preview ngoài danh sách chat
                const previewEl = document.getElementById(`last-msg-${m.sender_id}`);
                if(previewEl) previewEl.textContent = msgPreview;
              }
            } else if (m.sender_id === currentProfile.id && m.receiver_id === activeFriendId) {
              // Nếu là mình gửi (để hiển thị trên màn hình của mình)
              renderMessage(m);
            }

          } else if (payload.eventType === 'UPDATE') {
            const m = payload.new;
            if(activeFriendId) {
              const el = document.getElementById(`msg-${m.id}`);
              if(el && m.reaction) {
                let badge = el.querySelector('.reaction-badge');
                if(!badge) {
                  badge = document.createElement('div');
                  badge.className = 'reaction-badge';
                  el.appendChild(badge);
                }
                badge.textContent = m.reaction;
              }
            }
          }
        }).subscribe();
        
      // Nghe thay đổi bạn bè (để cập nhật danh sách lời mời và thông báo)
      mySupabaseClient.channel('public:friends')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'friends' }, (payload) => {
          loadFriendsData();
          if(payload.eventType === 'INSERT' && payload.new.receiver_id === currentProfile.id) {
            showAppNotification("Bạn mới kìa!", "Ai đó vừa gửi lời mời kết bạn cho bạn.");
          }
        }).subscribe();
    }
  </script>
